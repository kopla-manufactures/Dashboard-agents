<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Kanban — Dashboard Agents</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230b57d0'/><rect x='6' y='7' width='5.6' height='18' rx='2.2' fill='%23ffffff'/><rect x='13.2' y='7' width='5.6' height='12.5' rx='2.2' fill='%23ffffff' opacity='.72'/><rect x='20.4' y='7' width='5.6' height='8.5' rx='2.2' fill='%23ffffff' opacity='.45'/></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">
      <svg class="app-mark" viewBox="0 0 32 32" width="22" height="22" aria-hidden="true"><rect width="32" height="32" rx="8" fill="var(--color-primary)"/><rect x="6" y="7" width="5.6" height="18" rx="2.2" fill="var(--color-primary-text)"/><rect x="13.2" y="7" width="5.6" height="12.5" rx="2.2" fill="var(--color-primary-text)" opacity=".72"/><rect x="20.4" y="7" width="5.6" height="8.5" rx="2.2" fill="var(--color-primary-text)" opacity=".45"/></svg>
      Kanban
    </h1>
    <nav class="view-tabs" aria-label="Vista">
      <button id="tab-board" class="view-tab is-active" type="button" aria-pressed="true">Tablero</button>
      <button id="tab-dashboard" class="view-tab" type="button" aria-pressed="false">Dashboard</button>
    </nav>
    <span id="agents-sync-indicator" class="agents-sync-indicator" aria-live="polite" aria-atomic="true"></span>
    <div class="app-actions">
      <button id="btn-add-card" class="btn btn-primary" type="button">+ Nueva tarjeta</button>
      <button id="btn-menu" class="btn btn-ghost" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Más opciones">⋯</button>
      <div id="menu-panel" class="menu-panel" hidden>
        <button id="btn-sync-agents" class="menu-item" type="button">
          <svg class="menu-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9"/><path d="M13.9 2.3v3.5h-3.5"/></svg>
          Sincronizar agentes ahora
        </button>
        <hr class="menu-sep" />
        <button id="btn-add-column" class="menu-item" type="button">
          <svg class="menu-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 3.5v9M3.5 8h9"/></svg>
          Nueva columna
        </button>
        <hr class="menu-sep" />
        <button id="btn-export" class="menu-item" type="button">
          <svg class="menu-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2.5v8M5 7.5l3 3 3-3"/><path d="M3 13.5h10"/></svg>
          Exportar JSON
        </button>
        <button id="btn-import" class="menu-item" type="button">
          <svg class="menu-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 10.5v-8M5 5.5l3-3 3 3"/><path d="M3 13.5h10"/></svg>
          Importar JSON
        </button>
        <input id="import-file" type="file" accept="application/json" hidden />
      </div>
    </div>
  </header>

  <nav id="dept-bar" class="dept-bar" aria-label="Departamentos">
    <!-- Pestañas renderizadas por js/ui/deptBar.js -->
  </nav>

  <main id="board" class="board" aria-label="Tablero kanban">
    <!-- Columnas renderizadas por js/ui/board.js -->
  </main>

  <main id="dashboard" class="dashboard viz-root" aria-label="Dashboard ejecutivo" hidden>
    <!-- Métricas renderizadas por js/ui/dashboard.js -->
  </main>

  <p id="empty-state" class="empty-state" hidden>
    No hay columnas. Crea una con «+ Nueva columna».
  </p>

  <dialog id="card-dialog" class="card-dialog">
    <form id="card-form" method="dialog">
      <h2 id="card-dialog-title">Nueva tarjeta</h2>
      <label class="field">
        <span>Título *</span>
        <input name="title" type="text" required maxlength="120" autocomplete="off" />
      </label>
      <label class="field">
        <span>Descripción</span>
        <textarea name="description" rows="4" maxlength="2000"></textarea>
      </label>
      <div class="field-row">
        <label class="field">
          <span>Prioridad</span>
          <select name="priority">
            <option value="baja">Baja</option>
            <option value="media" selected>Media</option>
            <option value="alta">Alta</option>
          </select>
        </label>
        <label class="field">
          <span>Columna</span>
          <select name="columnId"></select>
        </label>
      </div>
      <label class="field">
        <span>Etiquetas (separadas por coma)</span>
        <input name="tags" type="text" maxlength="200" autocomplete="off" />
      </label>
      <div class="dialog-actions">
        <button type="button" id="btn-delete-card" class="btn btn-danger" hidden>Eliminar</button>
        <span class="spacer"></span>
        <button type="button" id="btn-cancel-card" class="btn btn-ghost">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
